  # PaperMod specific settings
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  
  [params.profileMode]
    enabled = true
    title = "Nigel Green"
    subtitle = "Strategic Finance | Business Architect | Forecaster"
    imageUrl = ""
    imageWidth = 120
    imageHeight = 120
    
    [[params.profileMode.buttons]]
      name = "View CV"
      url = "/cv"
    [[params.profileMode.buttons]]
      name = "Projects"
      url = "/projects"
    [[params.profileMode.buttons]]
      name = "Blog"
      url = "/posts"
