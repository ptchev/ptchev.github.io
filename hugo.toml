[menu]
  [[menu.main]]
    identifier = "career"
    name = "Career"
    url = "/career/"
    weight = 5
  [[menu.main]]
    identifier = "cv"
    name = "CV"
    url = "/cv/"
    weight = 10
  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 20
  [[menu.main]]
